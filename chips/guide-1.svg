<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 482" width="860" height="482" font-family="Segoe UI, Ubuntu, Helvetica, Arial, sans-serif">
<title>AGENTS field guide</title>
<rect x="1" y="1" width="858" height="480" rx="14" fill="#F4795B" fill-opacity="0.04" stroke="#F4795B" stroke-opacity="0.35" stroke-width="1.2"/>
<g transform="translate(30,26)">
<g><animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="18s" repeatCount="indefinite"/><circle cx="0" cy="-6.5" r="3.4" fill="#7FA36B"/><circle cx="6.2" cy="-2" r="3.4" fill="#7FA36B"/><circle cx="3.8" cy="5.3" r="3.4" fill="#7FA36B"/><circle cx="-3.8" cy="5.3" r="3.4" fill="#7FA36B"/><circle cx="-6.2" cy="-2" r="3.4" fill="#7FA36B"/></g><circle r="2.8" fill="#E2542F"/></g>
<text x="48" y="30" font-size="11" letter-spacing="2" fill="#8b949e">AGENTS</text>
<g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.15s" dur="0.5s" fill="freeze"/><g transform="translate(38,50) scale(0.8)"><path d="M5 19H10A5 5 0 115 14ZM19 14A5 5 0 1114 19H19ZM10 5A5 5 0 105 10V5ZM19 5V10A5 5 0 1014 5Z" fill="#E2542F"/></g><text x="76" y="58" font-size="13" font-weight="700" fill="#E2542F">LangGraph</text><text x="76" y="75" font-size="12" fill="#8b949e">Graph-based agent orchestration: nodes are steps, edges are control flow, with built-in state, checkpointing</text><text x="76" y="91" font-size="12" fill="#8b949e">and human-in-the-loop support.</text><path d="M76 98 H 820" stroke="#E2542F" stroke-opacity="0.15" stroke-width="1"/></g>
<g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.24s" dur="0.5s" fill="freeze"/><g transform="translate(38,112) scale(0.8)"><path d="M13.796 0a6.93 6.93 0 0 0-4.91 2.019L5.451 5.455l3.273 3.27 3.432-3.432a2.284 2.284 0 0 1 3.277 0 2.28 2.28 0 0 1 0 3.275L12 12.001l3.273 3.273 3.433-3.435c2.692-2.692 2.692-7.127 0-9.82A6.92 6.92 0 0 0 13.796 0m-5.07 8.728-3.433 3.434c-2.692 2.693-2.692 7.126 0 9.819A6.92 6.92 0 0 0 10.203 24a6.93 6.93 0 0 0 4.911-2.02l3.432-3.432-3.271-3.272-3.433 3.433a2.284 2.284 0 0 1-3.277 0 2.28 2.28 0 0 1 0-3.276L12 12z" fill="#F4795B"/></g><text x="76" y="120" font-size="13" font-weight="700" fill="#F4795B">LangChain</text><text x="76" y="137" font-size="12" fill="#8b949e">The building-block framework for LLM apps — model I/O, prompt templates, tool calling, memory and RAG</text><text x="76" y="153" font-size="12" fill="#8b949e">components you compose like Lego bricks.</text><path d="M76 160 H 820" stroke="#F4795B" stroke-opacity="0.15" stroke-width="1"/></g>
<g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.33s" dur="0.5s" fill="freeze"/><circle cx="48" cy="184" r="4" fill="#ED8B66"/><text x="76" y="182" font-size="13" font-weight="700" fill="#ED8B66">LlamaIndex</text><text x="76" y="199" font-size="12" fill="#8b949e">Data framework for RAG: document ingestion, chunking, embedding, indexing and query engines that connect</text><text x="76" y="215" font-size="12" fill="#8b949e">your private data to any LLM.</text><path d="M76 222 H 820" stroke="#ED8B66" stroke-opacity="0.15" stroke-width="1"/></g>
<g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.42s" dur="0.5s" fill="freeze"/><g transform="translate(38,236) scale(0.8)"><path d="M12.482.18C7.161 1.319 1.478 9.069 1.426 15.372c-.051 5.527 3.1 8.68 8.68 8.627 6.716-.05 14.259-6.87 12.09-10.9-.672-1.292-1.396-1.344-2.687-.207-1.602 1.395-1.654.31-.207-2.893 1.757-3.98 1.705-5.322-.31-7.544C17.03.388 14.962-.388 12.482.181Zm5.322 2.068c2.273 2.015 2.376 4.236.465 8.42-1.395 3.1-2.17 3.515-3.824 1.86-1.24-1.24-1.343-3.46-.258-6.044 1.137-2.635.982-3.1-.568-1.653-3.72 3.358-6.458 9.765-5.424 12.503.464 1.189.825 1.395 2.737 1.395 2.79 0 6.303-1.705 7.957-3.926 1.756-2.274 2.79-2.274 2.79-.052 0 3.875-6.459 8.627-11.625 8.627-6.251 0-9.351-4.752-7.491-11.47.878-2.995 4.443-7.904 7.077-9.66 3.255-2.17 5.684-2.17 8.164 0z" fill="#7FA36B"/></g><text x="76" y="244" font-size="13" font-weight="700" fill="#7FA36B">CrewAI</text><text x="76" y="261" font-size="12" fill="#8b949e">Multi-agent framework where role-playing agents (researcher, writer, reviewer...) collaborate as a crew,</text><text x="76" y="277" font-size="12" fill="#8b949e">each with its own goal, backstory and tools.</text><path d="M76 284 H 820" stroke="#7FA36B" stroke-opacity="0.15" stroke-width="1"/></g>
<g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.51s" dur="0.5s" fill="freeze"/><g transform="translate(38,298) scale(0.8)"><path d="M13.85 0a4.16 4.16 0 0 0-2.95 1.217L1.456 10.66a.835.835 0 0 0 0 1.18.835.835 0 0 0 1.18 0l9.442-9.442a2.49 2.49 0 0 1 3.541 0 2.49 2.49 0 0 1 0 3.541L8.59 12.97l-.1.1a.835.835 0 0 0 0 1.18.835.835 0 0 0 1.18 0l.1-.098 7.03-7.034a2.49 2.49 0 0 1 3.542 0l.049.05a2.49 2.49 0 0 1 0 3.54l-8.54 8.54a1.96 1.96 0 0 0 0 2.755l1.753 1.753a.835.835 0 0 0 1.18 0 .835.835 0 0 0 0-1.18l-1.753-1.753a.266.266 0 0 1 0-.394l8.54-8.54a4.185 4.185 0 0 0 0-5.9l-.05-.05a4.16 4.16 0 0 0-2.95-1.218c-.2 0-.401.02-.6.048a4.17 4.17 0 0 0-1.17-3.552A4.16 4.16 0 0 0 13.85 0m0 3.333a.84.84 0 0 0-.59.245L6.275 10.56a4.186 4.186 0 0 0 0 5.902 4.186 4.186 0 0 0 5.902 0L19.16 9.48a.835.835 0 0 0 0-1.18.835.835 0 0 0-1.18 0l-6.985 6.984a2.49 2.49 0 0 1-3.54 0 2.49 2.49 0 0 1 0-3.54l6.983-6.985a.835.835 0 0 0 0-1.18.84.84 0 0 0-.59-.245" fill="#E2542F"/></g><text x="76" y="306" font-size="13" font-weight="700" fill="#E2542F">MCP</text><text x="76" y="323" font-size="12" fill="#8b949e">Model Context Protocol — the open standard that lets any model talk to any tool or data source through one</text><text x="76" y="339" font-size="12" fill="#8b949e">interface. The USB-C of AI 🔌</text><path d="M76 346 H 820" stroke="#E2542F" stroke-opacity="0.15" stroke-width="1"/></g>
<g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.60s" dur="0.5s" fill="freeze"/><g transform="translate(38,360) scale(0.8)"><path d="m22.417 9.334-1.333 4.333-1.334-4.333h-1.583L20.1 14.94c.2.583-.14 1.06-.756 1.06h-.678v1.334h.996c.869 0 1.65-.55 1.945-1.367L24 9.334ZM2.833 6.667H0v8.666h2.833c3.5 0 4.5-2 4.5-4.333s-1-4.334-4.5-4.334zM2.866 14H1.6V8h1.266c2.013 0 2.867.988 2.867 3s-.854 3-2.867 3m11-5.267v.6h-1.532v1.334h1.533V14h-2.534V9.334H8v1.334h1.867V14h-2.2v1.334h10V14h-2.332v-3.333h2.333V9.334h-2.333V8h2.333V6.667h-1.733a2.07 2.07 0 0 0-2.067 2.067Zm-3.266-.2c.681 0 .933-.417.933-.933 0-.515-.252-.933-.933-.933-.68 0-.934.418-.934.933s.253.934.934.934" fill="#F4795B"/></g><text x="76" y="368" font-size="13" font-weight="700" fill="#F4795B">Dify</text><text x="76" y="385" font-size="12" fill="#8b949e">Open-source, self-hostable LLM-app platform: visual workflow builder, RAG pipeline, model gateway and</text><text x="76" y="401" font-size="12" fill="#8b949e">observability in one box.</text><path d="M76 408 H 820" stroke="#F4795B" stroke-opacity="0.15" stroke-width="1"/></g>
