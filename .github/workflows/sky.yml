name: Living scene
on:
  schedule:
    - cron: "23 */3 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  scene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Sync sky with real weather and season
        run: |
          python3 scripts/gen_scene.py
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "🌦 scene sync: $(cat .github/scene-state)"
            git pull --rebase origin main
            git push origin main
          fi
