name: Water the garden
on:
  issues:
    types: [opened]
permissions:
  contents: write
  issues: write
jobs:
  water:
    if: contains(github.event.issue.title, 'water') || contains(github.event.issue.title, '💧')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Bloom one more flower
        run: |
          n=$(( $(cat .github/water-count 2>/dev/null || echo 0) + 1 ))
          echo "$n" > .github/water-count
          python3 scripts/gen_water.py "$n" "${{ github.event.issue.user.login }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/water-count water-garden.svg
          git commit -m "💧 watered by @${{ github.event.issue.user.login }} (#$n)"
          git pull --rebase origin main
          git push origin main
      - name: Thank the gardener
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          n=$(cat .github/water-count)
          gh issue comment ${{ github.event.issue.number }} -R ${{ github.repository }} \
            -b "🌸 谢谢浇水!花园里为你开出了第 $n 朵花,回主页看看吧 ~"
          gh issue close ${{ github.event.issue.number }} -R ${{ github.repository }}
