name: generate snake animation

on:
  # 每 1 2 小时自动刷新一次
  schedule:
    -  cron: "0 */12 * * *"
  # 允许在 Actions � �面手动触发
  workflow_dispatch:
  # 推 送到 main 时也跑一次
  push:
    branc hes:
      - main

permissions:
  contents: w rite

jobs:
  generate:
    runs-on: ubuntu-l atest
    timeout-minutes: 5
    steps:
       - name: generate github-contribution-grid-sn ake.svg
        uses: Platane/snk/svg-only@v3 
        with:
          github_user_name: ${ { github.repository_owner }}
          output s: |
            dist/github-contribution-gri d-snake.svg?color_snake=#F4795B&color_dots=#EB EDF0,#FFE0B2,#FFB74D,#FB8C00,#E65100
             dist/github-contribution-grid-snake-dark. svg?color_snake=#F4795B&color_dots=#161B22,#5A 3300,#A86A00,#FB8C00,#FFCC80

      - name: p ush github-contribution-grid-snake.svg to the  output branch
        uses: crazy-max/ghacti on-github-pages@v4.0.0
        with:
           target_branch: output
          build_dir:  dist
        env:
          GITHUB_TOKEN: ${{  secrets.GITHUB_TOKEN }}
 