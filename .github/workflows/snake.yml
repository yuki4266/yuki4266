name: generate snake animation

on:
  # 每 12 小时自动刷新一次
  schedule:
    - cron: "0 */12 * * *"
  # 允许在 Actions 页面手动触发
  workflow_dispatch:
  # 推送到 main 时也跑一次
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=FF8C00&color_dots=#EBEDF0,#FFE0B2,#FFB74D,#FB8C00,#E65100
            dist/github-contribution-grid-snake-dark.svg?color_snake=FF8C00&color_dots=#161B22,#5A3300,#A86A00,#FB8C00,#FFCC80

      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4.0.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
